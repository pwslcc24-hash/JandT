# Always-on Slack Socket Mode worker (no public HTTP port).
app = "jandt-slack-bot"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"

[processes]
  worker = "npm run start:prod"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
  processes = ["worker"]

[deploy]
  strategy = "immediate"
