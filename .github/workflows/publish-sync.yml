name: Publish sync

on:
  push:
    branches: [main]
      paths:
      - src/cms/seed/defaultSite.ts
      - src/cms/seed/registryHtml.ts
      - src/cms/seed/agendaHtml.ts
      - src/config/wedding.js
      - src/styles/canvas-editor.css
      - src/index.css

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install slack-bot deps
        working-directory: slack-bot
        run: npm ci

      - name: Sync defaultSite → Base44 SiteContent
        working-directory: slack-bot
        env:
          VITE_BASE44_APP_ID: 6a2b01575fdcdc3d21540f60
        run: npm run publish-sync
