name: Publish sync

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - src/cms/seed/defaultSite.ts
      - src/cms/seed/registryHtml.ts
      - src/cms/seed/agendaHtml.ts
      - src/config/wedding.js
      - src/styles/canvas-editor.css
      - src/index.css
      - scripts/publish-sync.ts
      - automation/**
      - .github/workflows/publish-sync.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install root deps
        run: npm ci

      - name: Install automation deps
        working-directory: automation
        run: npm ci

      - name: Sync defaultSite → Base44 SiteContent
        working-directory: automation
        env:
          VITE_BASE44_APP_ID: 6a2b01575fdcdc3d21540f60
        run: npm run publish-sync
