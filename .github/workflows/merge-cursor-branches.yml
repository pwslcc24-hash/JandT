name: Merge cursor branch to main

# Cursor Automations often push to cursor/* instead of main — merge so publish-sync runs.
on:
  push:
    branches:
      - "cursor/**"

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge branch into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git pull origin main
          git merge "origin/${{ github.ref_name }}" -m "Auto-merge ${{ github.ref_name }} from Slack edit"
          git push origin main
