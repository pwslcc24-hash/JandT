name: Site edit

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: What to change on the wedding site
        required: true
        type: string

jobs:
  edit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: slack-bot/package-lock.json

      - name: Install
        working-directory: slack-bot
        run: npm ci

      - name: Run Cursor agent
        working-directory: slack-bot
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPO_URL: https://github.com/${{ github.repository }}
          GITHUB_BRANCH: main
          GIT_MODE: main
        run: npm run edit -- "${{ github.event.inputs.prompt }}"
